<!DOCTYPE html>
<html lang="en" data-theme="light" data-view-mode="desktop">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Inventory</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #edeae5;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #6d6b66;
      --color-text-faint: #a5a39c;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --color-success: #437a22;
      --color-warning: #964219;
      --color-error: #a13544;
      --color-blue: #006494;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(24,24,24,.06);
      --shadow-md: 0 10px 28px rgba(24,24,24,.08);
      --shadow-lg: 0 18px 40px rgba(24,24,24,.14);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', 'Segoe UI', sans-serif;
      --header-h: 5.25rem;
      --filters-h: 11rem;
      --carousel-h: 8.5rem;
      --carousel-collapsed-h: 3.75rem;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #2a2826;
      --color-border: #393836;
      --color-divider: #2d2c2a;
      --color-text: #ece9e3;
      --color-text-muted: #b9b3aa;
      --color-text-faint: #8e887f;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-primary-highlight: #313b3b;
      --color-success: #6daa45;
      --color-warning: #fdab43;
      --color-error: #dd6974;
      --color-blue: #76b7df;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.24);
      --shadow-md: 0 10px 28px rgba(0,0,0,.28);
      --shadow-lg: 0 18px 40px rgba(0,0,0,.4);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.45;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }
    img { display: block; max-width: 100%; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    .app { min-height: 100dvh; display: grid; grid-template-rows: auto auto auto 1fr; }

    .sticky {
      position: sticky; z-index: 25; backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--color-bg) 88%, transparent);
      border-bottom: 1px solid var(--color-divider);
    }

    .topbar {
      top: 0;
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      z-index: 40;
      flex-wrap: wrap;
      position: relative;
    }

    .header-left,
    .header-center,
    .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .header-center {
      justify-content: center;
      flex: 1 1 320px;
    }

    .header-left {
      flex: 0 1 auto;
    }

    .header-right {
      flex: 0 1 auto;
      justify-content: flex-end;
      position: relative;
    }

    .filters {
      position: relative;
      min-height: var(--filters-h);
      padding: var(--space-4) var(--space-5);
      z-index: 38;
      transition: min-height var(--transition);
    }

    .filters.collapsed {
      min-height: auto;
    }

    .filters.collapsed .filters-grid {
      display: none;
    }

    .filters.collapsed .clear-filters-row {
      display: none;
    }

    .clear-filters-row {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--space-3);
    }

    .carousel-wrap {
      position: relative;
      min-height: var(--carousel-h);
      padding: var(--space-3) var(--space-5) var(--space-4);
      transition: min-height var(--transition);
      z-index: 37;
    }

    .carousel-wrap.collapsed {
      min-height: var(--carousel-collapsed-h);
    }

    .brand { display: flex; align-items: center; gap: var(--space-3); }
    .logo { width: 34px; height: 34px; color: var(--color-primary); }
    .title { font-size: var(--text-xl); font-weight: 700; letter-spacing: -.03em; }

    .theme-btn, .cart-btn, .nav-btn, .action-btn, .secondary-btn, .danger-btn, .toggle-btn, .marquee-btn, .view-mode-btn, .hamburger-btn {
      min-height: 44px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      color: var(--color-text);
      padding: 0 var(--space-4);
      transition: all var(--transition);
    }

    .theme-btn, .view-mode-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .55rem;
      min-width: 108px;
    }

    .theme-btn svg, .view-mode-btn svg {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .cart-btn, .action-btn, .marquee-btn {
      background: var(--color-primary);
      color: #fff;
      border-color: transparent;
    }

    .cart-btn:hover, .action-btn:hover, .marquee-btn:hover { background: var(--color-primary-hover); }
    .secondary-btn:hover, .theme-btn:hover, .nav-btn:hover, .danger-btn:hover, .toggle-btn:hover, .view-mode-btn:hover, .hamburger-btn:hover { background: var(--color-surface-offset); }
    .danger-btn { background: color-mix(in srgb, var(--color-error) 10%, var(--color-surface-2)); }

    .header-center .nav-btn {
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .nav-btn svg { width: 16px; height: 16px; flex: 0 0 auto; }

    .filters-grid {
      display: grid;
      grid-template-columns: 88px minmax(150px, 1fr) minmax(150px, 1fr) minmax(150px, 1fr) 88px 120px 120px;
      gap: var(--space-3);
      align-items: end;
    }

    .filters-grid.sold {
      grid-template-columns: 88px minmax(140px, 1fr) minmax(140px, 1fr) minmax(140px, 1fr) 88px 118px 118px 118px 118px;
    }

    .field {
      display: grid;
      gap: var(--space-1);
      min-width: 0;
    }

    .field label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    .field input {
      min-height: 44px;
      width: 100%;
      min-width: 0;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      padding: 0 var(--space-3);
      color: var(--color-text);
    }

    .field input:focus { outline: 2px solid var(--color-primary); outline-offset: 2px; }

    .filters-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
      margin-top: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }

    .filters-row-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .filter-actions {
      display: flex;
      gap: var(--space-3);
      align-items: center;
      flex-wrap: wrap;
    }

    #statusChip.filters-status-chip {
      display: none;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      font-size: var(--text-sm);
      border-radius: var(--radius-full);
      padding: .55rem .85rem;
      background: var(--color-primary-highlight);
      color: var(--color-text);
    }

    .status-chip::before {
      content: '';
      width: .6rem;
      height: .6rem;
      border-radius: 50%;
      background: var(--color-primary);
    }

    .carousel-header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .carousel-panel {
      overflow: hidden;
    }

    .carousel-panel.hidden {
      display: none;
    }

    .carousel {
      display: grid;
      grid-template-columns: repeat(5, minmax(110px, 140px));
      gap: var(--space-3);
      overflow-x: auto;
      padding-bottom: var(--space-1);
      align-items: start;
      justify-content: center;
    }

    .carousel-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      min-width: 110px;
      max-width: 140px;
      margin-inline: auto;
    }

    .carousel-card button {
      width: 100%;
      border: 0;
      background: none;
      padding: 0;
      text-align: center;
      color: inherit;
    }

    .carousel-image {
      position: relative;
      aspect-ratio: 4/5;
      background: var(--color-surface-offset);
      overflow: hidden;
      max-height: 145px;
    }

    .carousel-image img { width: 100%; height: 100%; object-fit: cover; }

    .carousel-meta {
      font-size: var(--text-xs);
      padding: var(--space-2);
      line-height: 1.3;
    }

    .empty {
      padding: var(--space-4);
      color: var(--color-text-muted);
      text-align: center;
    }

    .inventory { padding: var(--space-5); }

    .inventory-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }

    .count { color: var(--color-text-muted); font-size: var(--text-sm); }

    .table-shell {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--color-surface);
    }

    .table-head, .table-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      padding: var(--space-3) var(--space-4);
    }

    .table-head.for-sale-cols, .table-row.for-sale-cols {
      grid-template-columns: 40px 90px 1.4fr 1.2fr 1fr 100px 110px;
    }

    .table-head.sold-cols, .table-row.sold-cols {
      grid-template-columns: 40px 90px 1.4fr 1.2fr 1fr 100px 100px 110px;
    }

    .table-head {
      background: var(--color-surface-offset);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--color-text-muted);
      position: sticky;
      top: 0;
    }

    .table-head button.sortable {
      background: none;
      border: 0;
      color: inherit;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 0;
      display: inline-flex;
      align-items: center;
      gap: .3rem;
    }

    .table-head button.sortable:hover { color: var(--color-text); }
    .sort-ind { font-size: .7rem; opacity: .6; }

    .table-body { max-height: 55vh; overflow-y: auto; }
    .table-body.carousel-collapsed { max-height: 65vh; }

    .table-row { border-top: 1px solid var(--color-divider); font-size: var(--text-sm); }
    .table-row:hover { background: var(--color-surface-2); }
    .mono { font-family: 'Satoshi', monospace; }

    .checkbox { width: 18px; height: 18px; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: var(--space-4);
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--color-surface); border-radius: var(--radius-lg);
      max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal.small { max-width: 380px; }
    .modal.cart-modal { max-width: 900px; }

    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-divider);
    }
    .modal-title { font-weight: 700; font-size: var(--text-lg); }
    .close-btn { background: none; border: 0; font-size: 1.5rem; cursor: pointer; color: var(--color-text-muted); }

    .detail-grid { padding: var(--space-5); display: grid; gap: var(--space-4); grid-template-columns: 1fr 1fr; }
    .detail-card { display: grid; gap: var(--space-3); }
    .detail-image-wrap { border-radius: var(--radius-lg); overflow: hidden; background: var(--color-surface-offset); }
    .detail-image-wrap img { width: 100%; }
    .disclaimer { font-size: var(--text-xs); color: var(--color-text-muted); }
    .detail-meta { display: grid; gap: var(--space-3); align-content: start; }
    .detail-label { display: block; font-size: var(--text-xs); text-transform: uppercase; color: var(--color-text-muted); letter-spacing: .05em; }

    .pin-input {
      min-height: 44px; border-radius: var(--radius-md); border: 1px solid var(--color-border);
      padding: 0 var(--space-3); background: var(--color-surface-2); color: var(--color-text); width: 100%;
    }
    .muted { color: var(--color-error); font-size: var(--text-sm); min-height: 1.2em; }
    .page-label { color: var(--color-text-muted); font-size: var(--text-sm); }

    .cart-list { padding: var(--space-4) var(--space-5); display: grid; gap: var(--space-3); }
    .cart-row {
      display: grid; grid-template-columns: 1.5fr 1fr 1fr auto; gap: var(--space-3); align-items: center;
      border-bottom: 1px solid var(--color-divider); padding-bottom: var(--space-3);
    }
    .cart-row input {
      min-height: 40px; border-radius: var(--radius-md); border: 1px solid var(--color-border);
      padding: 0 var(--space-2); background: var(--color-surface-2); color: var(--color-text); width: 100%;
    }
    .cart-row .cart-desc {
      color: var(--color-text);
    }
    .cart-summary { padding: var(--space-4) var(--space-5); border-top: 2px solid var(--color-divider); display: grid; gap: var(--space-4); }
    .cart-adjust input {
      min-height: 44px; border-radius: var(--radius-md); border: 1px solid var(--color-border);
      padding: 0 var(--space-3); background: var(--color-surface-2); color: var(--color-text); width: 100%; margin-top: var(--space-2);
    }
    .totals { display: grid; gap: var(--space-1); font-size: var(--text-base); }
    .qr-grid { display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; }
    .qr-card { width: 100px; height: 100px; border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
    .qr-card img { width: 100%; height: 100%; object-fit: contain; }

    .danger-btn.remove-btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .danger-btn.remove-btn svg { width: 16px; height: 16px; flex: 0 0 auto; }

    /* ===================== iPhone view mode override ===================== */
    html[data-view-mode="iphone"] body {
      max-width: 430px;
      margin: 0 auto;
      border-left: 1px solid var(--color-divider);
      border-right: 1px solid var(--color-divider);
      box-shadow: var(--shadow-lg);
    }

    html[data-view-mode="iphone"] .topbar {
      min-height: auto;
      padding: var(--space-3) var(--space-4);
      justify-content: space-between;
      flex-wrap: nowrap;
    }

    html[data-view-mode="iphone"] .header-center {
      display: none;
    }

    /* FIX: only hide the TOP-ROW copies of theme/view-mode/marquee buttons, not the ones inside the hamburger dropdown */
    html[data-view-mode="iphone"] .header-right > .theme-btn,
    html[data-view-mode="iphone"] .header-right > .view-mode-btn,
    html[data-view-mode="iphone"] .header-right > .marquee-btn {
      display: none;
    }

    html[data-view-mode="iphone"] .header-left {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
    }

    html[data-view-mode="iphone"] .brand {
      flex: 0 0 auto;
      min-width: 0;
    }

    html[data-view-mode="iphone"] .title {
      font-size: var(--text-base);
      white-space: nowrap;
    }

    html[data-view-mode="iphone"] .logo {
      width: 26px;
      height: 26px;
    }

    .phone-status-chip {
      display: none;
    }
    html[data-view-mode="iphone"] .phone-status-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: 0.65rem;
      border-radius: var(--radius-full);
      padding: .3rem .5rem;
      background: var(--color-primary-highlight);
      color: var(--color-text);
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .phone-status-chip::before {
      content: '';
      width: .45rem;
      height: .45rem;
      border-radius: 50%;
      background: var(--color-primary);
      flex: 0 0 auto;
    }

    html[data-view-mode="iphone"] .header-right {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex: 0 0 auto;
    }

    html[data-view-mode="iphone"] .cart-btn {
      min-width: 0;
      padding: 0 var(--space-3);
      font-size: var(--text-xs);
      white-space: nowrap;
    }

    .hamburger-btn {
      display: none;
    }

    html[data-view-mode="iphone"] .hamburger-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      min-height: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .hamburger-btn svg { width: 18px; height: 18px; }

    /* FIX: hamburger menu is now an absolutely-positioned dropdown so it never shifts other header content */
    .hamburger-menu {
      display: none;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-3);
    }

    html[data-view-mode="iphone"] .hamburger-menu.open {
      display: flex;
      position: absolute;
      top: calc(100% + var(--space-2));
      right: var(--space-4);
      width: 240px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      z-index: 60;
    }

    .hamburger-menu .nav-btn,
    .hamburger-menu .theme-btn,
    .hamburger-menu .view-mode-btn,
    .hamburger-menu .marquee-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      min-width: 0;
    }

    html[data-view-mode="iphone"] .header-center .nav-btn {
      flex: 1 1 auto;
      min-width: 0;
      font-size: var(--text-xs);
      padding: 0 var(--space-2);
    }

    html[data-view-mode="iphone"] .filters-grid,
    html[data-view-mode="iphone"] .filters-grid.sold {
      grid-template-columns: 1fr 1fr;
    }

    html[data-view-mode="iphone"] .carousel {
      grid-template-columns: minmax(160px, 220px);
    }

    html[data-view-mode="iphone"] .table-head.for-sale-cols,
    html[data-view-mode="iphone"] .table-row.for-sale-cols,
    html[data-view-mode="iphone"] .table-head.sold-cols,
    html[data-view-mode="iphone"] .table-row.sold-cols {
      grid-template-columns: 30px repeat(6, minmax(70px, 1fr));
      font-size: var(--text-xs);
      overflow-x: auto;
    }

    html[data-view-mode="iphone"] .detail-grid {
      grid-template-columns: 1fr;
    }

    html[data-view-mode="iphone"] .modal.cart-modal {
      max-width: 95vw;
    }

    /* ===================== Marquee fullscreen overlay ===================== */
    .marquee-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .marquee-overlay.open {
      display: flex;
    }

    .marquee-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4) var(--space-5);
      color: #fff;
    }

    .marquee-topbar .close-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      font-size: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-full);
      line-height: 1;
    }

    .marquee-viewport {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      position: relative;
    }

    .marquee-track {
      display: flex;
      gap: var(--space-5);
      align-items: center;
      white-space: nowrap;
      animation: marquee-scroll linear infinite;
      padding: 0 var(--space-5);
    }

    .marquee-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-2);
      flex: 0 0 auto;
    }

    .marquee-track img {
      height: 60vh;
      max-height: 520px;
      width: auto;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
    }

    .marquee-cap {
      color: #fff;
      font-size: var(--text-sm);
      opacity: .85;
    }

    .marquee-caption {
      color: #fff;
      text-align: center;
      font-size: var(--text-sm);
      opacity: .8;
      padding: var(--space-3) 0;
    }

    @keyframes marquee-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>

  <div class="app">
    <header class="topbar sticky">
      <div class="header-left">
        <div class="brand">
          <svg class="logo" viewBox="0 0 48 48" fill="none" aria-label="Card Inventory logo">
            <rect x="8" y="10" width="23" height="28" rx="4" stroke="currentColor" stroke-width="3"></rect>
            <rect x="18" y="6" width="22" height="28" rx="4" stroke="currentColor" stroke-width="3" opacity=".65"></rect>
          </svg>
          <div class="title">Card Inventory</div>
        </div>
        <div class="phone-status-chip" id="phoneStatusChip">For Sale</div>
      </div>

      <nav class="header-center" aria-label="Inventory views">
        <button class="nav-btn" data-view-link="for-sale">For Sale Items</button>
        <button class="nav-btn" data-view-link="keep">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
          <span>PC</span>
        </button>
        <button class="nav-btn" data-view-link="sold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
          <span>Sold Items</span>
        </button>
      </nav>

      <div class="header-right">
        <button class="theme-btn" data-theme-toggle aria-label="Switch theme">
          <span class="theme-icon" id="themeIcon" aria-hidden="true"></span>
          <span id="themeLabel">Theme</span>
        </button>
        <button class="view-mode-btn" id="viewModeToggle" aria-label="Toggle Phone / Desktop view">
          <span id="viewModeLabel">Phone</span>
        </button>
        <button class="marquee-btn" id="openMarqueeBtn" type="button">Marquee</button>
        <button class="cart-btn" id="openCartBtn">View Cart (<span id="cartCount">0</span>)</button>
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M3 6h18M3 12h18M3 18h18"></path>
          </svg>
        </button>

        <div class="hamburger-menu" id="hamburgerMenu">
          <button class="nav-btn" data-view-link="for-sale">For Sale Items</button>
          <button class="nav-btn" data-view-link="keep">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            <span>PC</span>
          </button>
          <button class="nav-btn" data-view-link="sold">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="5" y="11" width="14" height="9" rx="2"></rect><path d="M8 11V7a4 4 0 0 1 8 0v4"></path></svg>
            <span>Sold Items</span>
          </button>
          <button class="theme-btn" id="hamburgerThemeBtn" aria-label="Switch theme">
            <span id="hamburgerThemeLabel">Theme</span>
          </button>
          <button class="view-mode-btn" id="hamburgerViewModeBtn">
            <span id="hamburgerViewModeLabel">Desktop</span>
          </button>
          <button class="marquee-btn" id="hamburgerMarqueeBtn" type="button">Marquee</button>
        </div>
      </div>
    </header>

    <section class="filters sticky" id="filtersSection" aria-labelledby="filtersHeading">
      <div class="filters-row">
        <div class="filters-row-left">
          <button class="toggle-btn" id="toggleFiltersBtn" type="button" aria-expanded="true">Collapse Filters</button>
          <div>
            <div id="filtersHeading" class="modal-title">Search and filters</div>
            <div class="page-label" id="filterHint">Showing items marked For Sale</div>
          </div>
        </div>
        <div class="filter-actions">
          <div class="status-chip filters-status-chip" id="statusChip">For Sale</div>
        </div>
      </div>
      <div class="filters-grid" id="filtersGrid"></div>
      <div class="clear-filters-row">
        <button class="secondary-btn" id="clearFiltersBtn" type="button">Clear Filters</button>
      </div>
    </section>

    <section class="carousel-wrap sticky" id="carouselWrap" aria-label="Card image carousel">
      <div class="carousel-header">
        <button class="toggle-btn" id="toggleCarouselBtn" type="button" aria-expanded="true">Show/Hide Card Images</button>
      </div>
      <div class="carousel-panel" id="carouselPanel">
        <div class="carousel" id="carousel"></div>
      </div>
    </section>

    <main class="inventory" id="main">
      <div class="inventory-head">
        <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
          <button class="action-btn" id="tableActionBtn">Add selected to cart</button>
        </div>
        <div class="count" id="itemCount">0 items shown</div>
      </div>

      <section class="table-shell" aria-label="Inventory table">
        <div class="table-head" id="tableHead"></div>
        <div class="table-body" id="tableBody"></div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="itemModalBackdrop" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">Card details</div>
        <button class="close-btn" data-close="itemModalBackdrop" aria-label="Close card details">×</button>
      </div>
      <div class="detail-grid" id="itemModalContent"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="cartModalBackdrop" aria-hidden="true">
    <div class="modal cart-modal">
      <div class="modal-head">
        <div class="modal-title">Shopping Cart</div>
        <button class="close-btn" data-close="cartModalBackdrop" aria-label="Close cart">×</button>
      </div>
      <div id="cartContent"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="pinModalBackdrop" aria-hidden="true">
    <div class="modal small">
      <div class="modal-head">
        <div class="modal-title">Admin PIN required</div>
        <button class="close-btn" data-close="pinModalBackdrop" aria-label="Close PIN dialog">×</button>
      </div>
      <div class="detail-card">
        <div class="page-label" id="pinPromptText">Enter the Admin PIN to continue.</div>
        <input class="pin-input" id="pinInput" type="password" inputmode="numeric" placeholder="Enter PIN" maxlength="10" />
        <div id="pinError" class="muted"></div>
        <button class="action-btn" id="pinSubmitBtn">Unlock view</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="confirmAddModalBackdrop" aria-hidden="true">
    <div class="modal small">
      <div class="modal-head">
        <div class="modal-title">Added to Cart</div>
        <button class="close-btn" data-close="confirmAddModalBackdrop" aria-label="Close confirmation">×</button>
      </div>
      <div class="detail-card">
        <div class="page-label" id="confirmAddText">Items added.</div>
        <button class="action-btn" data-close="confirmAddModalBackdrop">OK</button>
      </div>
    </div>
  </div>

  <div class="marquee-overlay" id="marqueeOverlay" aria-hidden="true">
    <div class="marquee-topbar">
      <div>Items for Sale</div>
      <button class="close-btn" id="closeMarqueeBtn" aria-label="Close marquee">×</button>
    </div>
    <div class="marquee-viewport">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>
    <div class="marquee-caption">Click anywhere to close and return to the home page</div>
  </div>

  <script>
    const APP = {
      adminPin: '4321',
      currentView: 'for-sale',
      pendingView: null,
      unlocked: { keep: false, sold: false },
      sort: { key: 'Desired Price', direction: 'desc', custom: false },
      filters: {},
      selected: new Set(),
      cart: [],
      cartItemOverrides: {},
      cartGlobalOverride: '',
      manualTheme: null,
      imageBasePath: 'card_images/',
      carouselExpanded: true,
      filtersExpanded: true,
      viewMode: 'desktop',
      visibleCarouselIds: []
    };

    Let DATA = [};

    function money(value) {
      const num = Number(value);
      if (Number.isNaN(num)) return '-';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function cleanMoneyInput(value) {
      const cleaned = String(value ?? '')
        .replace(/[^0-9.]/g, '')
        .replace(/(\..*)\./g, '$1');

      const parts = cleaned.split('.');
      if (parts.length <= 1) return cleaned;

      return `${parts[0]}.${parts[1].slice(0, 2)}`;
    }

    function parseMoneyInput(value) {
      const cleaned = cleanMoneyInput(value);
      if (cleaned === '' || cleaned === '.') return null;
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : null;
    }

    function captureFocusState() {
      const active = document.activeElement;
      if (!active) return null;
      if (!(active instanceof HTMLInputElement || active instanceof HTMLTextAreaElement)) return null;

      const id = active.id || null;
      const dataFilter = active.dataset ? active.dataset.filter || null : null;
      const dataItemOverride = active.dataset ? active.dataset.itemOverride || null : null;
      const isCartGlobalOverride = active.id === 'cartGlobalOverride';
      const isCartField = Boolean(dataItemOverride || isCartGlobalOverride);

      return {
        id,
        dataFilter,
        dataItemOverride,
        isCartGlobalOverride,
        isCartField,
        selectionStart: active.selectionStart ?? null,
        selectionEnd: active.selectionEnd ?? null
      };
    }

    function restoreFocusState(state) {
      if (!state) return;

      let target = null;

      if (state.id) target = document.getElementById(state.id);
      if (!target && state.dataFilter) target = document.querySelector(`[data-filter="${CSS.escape(state.dataFilter)}"]`);
      if (!target && state.dataItemOverride) target = document.querySelector(`[data-item-override="${CSS.escape(state.dataItemOverride)}"]`);
      if (!target && state.isCartGlobalOverride) target = document.getElementById('cartGlobalOverride');
      if (!target) return;

      target.focus({ preventScroll: true });

      const valueLength = target.value != null ? String(target.value).length : 0;

      requestAnimationFrame(() => {
        if (state.isCartField) {
          try {
            target.setSelectionRange(valueLength, valueLength);
          } catch (err) {}
          return;
        }

        if (typeof state.selectionStart === 'number' && typeof state.selectionEnd === 'number') {
          const start = Math.min(state.selectionStart, valueLength);
          const end = Math.min(state.selectionEnd, valueLength);
          try {
            target.setSelectionRange(start, end);
          } catch (err) {}
        }
      });
    }

    function rerenderPreserveFocus(callback) {
      const focusState = captureFocusState();
      callback();
      restoreFocusState(focusState);
    }

    function getItemNumber(item) {
      return item['Item #'] ?? item.Item ?? '';
    }

    function getImageId(item) {
      return item['Card ID'] ?? item.id ?? getItemNumber(item) ?? '0';
    }

    function normalizeStatus(status) {
      return String(status || '').trim().toLowerCase();
    }

    function getImagePath(item) {
      const id = getImageId(item) || '0';
      return `${APP.imageBasePath}${id}.jpg`;
    }

    function themeIconSvg(theme) {
      if (theme === 'dark') {
        return `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      `;
    }

    function updateVisibleCarouselFromTable() {
      if (!APP.carouselExpanded) {
        APP.visibleCarouselIds = [];
        renderCarousel();
        return;
      }

      const rows = [...els.tableBody.querySelectorAll('[data-row-item]')];
      if (!rows.length) {
        APP.visibleCarouselIds = [];
        renderCarousel();
        return;
      }

      const bodyRect = els.tableBody.getBoundingClientRect();

      const visibleRows = rows.filter(row => {
        const rect = row.getBoundingClientRect();
        return rect.bottom > bodyRect.top && rect.top < bodyRect.bottom;
      });

      const maxImages = APP.viewMode === 'iphone' ? 1 : 5;
      const topVisible = visibleRows.slice(0, maxImages).map(row => row.dataset.rowItem);
      APP.visibleCarouselIds = topVisible;
      renderCarousel();
    }

    function handleTableScrollForCarousel() {
      updateVisibleCarouselFromTable();
    }

    function bindTableScrollCarousel() {
      els.tableBody.removeEventListener('scroll', handleTableScrollForCarousel);
      els.tableBody.addEventListener('scroll', handleTableScrollForCarousel, { passive: true });
    }

    function renderFilters() {
      const cfg = FIELD_CONFIG[APP.currentView];
      els.filtersGrid.className = `filters-grid ${APP.currentView === 'sold' ? 'sold' : ''}`;
      els.filtersGrid.innerHTML = cfg.filters.map(([key, label]) => `
        <div class="field">
          <label for="filter-${key}">${label}</label>
          <input id="filter-${key}" data-filter="${key}" value="${escapeHtml(APP.filters[key] || '')}" />
        </div>
      `).join('');

      els.filtersGrid.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
          APP.filters[e.target.dataset.filter] = e.target.value;
          rerenderPreserveFocus(() => renderApp());
        });
      });
    }

    function clearFilters() {
      APP.filters = {};
      renderApp();
    }

    function updateCarouselState() {
      els.carouselWrap.classList.toggle('collapsed', !APP.carouselExpanded);
      els.carouselPanel.classList.toggle('hidden', !APP.carouselExpanded);
      els.toggleCarouselBtn.textContent = 'Show/Hide Card Images';
      els.toggleCarouselBtn.setAttribute('aria-expanded', String(APP.carouselExpanded));
      els.tableBody.classList.toggle('carousel-collapsed', !APP.carouselExpanded);
    }

    function itemMatchesView(item) {
      const status = normalizeStatus(item.Status);
      if (APP.currentView === 'for-sale') return status === 'for sale';
      if (APP.currentView === 'keep') return status === 'keep';
      if (APP.currentView === 'sold') return status === 'sold';
      return false;
    }

    function textIncludes(value, search) {
      return String(value ?? '').toLowerCase().includes(String(search ?? '').trim().toLowerCase());
    }

    function numValue(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function itemMatchesFilters(item) {
      const f = APP.filters;
      if (f.item && !textIncludes(getItemNumber(item), f.item)) return false;
      if (f.player && !textIncludes(item.Player, f.player)) return false;
      if (f.set && !textIncludes(item.Set, f.set)) return false;
      if (f.variant && !textIncludes(item.Variant, f.variant)) return false;
      if (f.cardNumber && !textIncludes(item['Card Number'], f.cardNumber)) return false;

      const desired = numValue(item['Desired Price']);
      const value = numValue(item.Value);
      const salePrice = numValue(item['Sale Price']);

      if (APP.currentView !== 'sold') {
        if (f.minPrice && (desired === null || desired < Number(f.minPrice))) return false;
        if (f.maxPrice && (desired === null || desired > Number(f.maxPrice))) return false;
      } else {
        if (f.minValue && (value === null || value < Number(f.minValue))) return false;
        if (f.maxValue && (value === null || value > Number(f.maxValue))) return false;
        if (f.minSalePrice && (salePrice === null || salePrice < Number(f.minSalePrice))) return false;
        if (f.maxSalePrice && (salePrice === null || salePrice > Number(f.maxSalePrice))) return false;
      }

      return true;
    }

    function compareValues(a, b, direction) {
      if (a == null && b == null) return 0;
      if (a == null) return 1;
      if (b == null) return -1;
      const dir = direction === 'asc' ? 1 : -1;

      const an = Number(a);
      const bn = Number(b);
      const bothNumeric = !Number.isNaN(an) && !Number.isNaN(bn);

      if (bothNumeric) return (an - bn) * dir;
      return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }) * dir;
    }

    function filteredItems() {
      const list = DATA.filter(item => itemMatchesView(item) && itemMatchesFilters(item));
      const { key, direction } = APP.sort;
      if (!key || !direction) return list;
      return [...list].sort((a, b) => compareValues(a[key], b[key], direction));
    }

    function toggleSort(key) {
      if (APP.sort.key !== key) {
        APP.sort = { key, direction: 'asc', custom: true };
      } else if (APP.sort.direction === 'asc') {
        APP.sort.direction = 'desc';
        APP.sort.custom = true;
      } else if (APP.sort.direction === 'desc') {
        APP.sort = { key: null, direction: null, custom: false };
      } else {
        APP.sort = { key, direction: 'asc', custom: true };
      }
      renderApp();
    }

    function ensureDefaultSort() {
      if (!APP.sort.custom && !APP.sort.key) {
        APP.sort = {
          key: FIELD_CONFIG[APP.currentView].sortDefault,
          direction: 'desc',
          custom: false
        };
      }
    }

    function renderTable(items) {
      const cfg = FIELD_CONFIG[APP.currentView];
      const colClass = APP.currentView === 'sold' ? 'sold-cols' : 'for-sale-cols';

      els.tableHead.className = `table-head ${colClass}`;
      els.tableBody.innerHTML = '';

      els.tableHead.innerHTML = cfg.columns.map(col => {
        if (col.key === '__select') return '<div><input type="checkbox" id="selectAll" aria-label="Select all visible rows" /></div>';
        const active = APP.sort.key === col.key ? (APP.sort.direction === 'asc' ? '▲' : '▼') : '↕';
        return `<div><button class="sortable" data-sort="${escapeHtml(col.key)}">${escapeHtml(col.label)} <span class="sort-ind">${active}</span></button></div>`;
      }).join('');

      els.tableHead.querySelectorAll('[data-sort]').forEach(btn => {
        btn.addEventListener('click', () => toggleSort(btn.dataset.sort));
      });

      const selectAll = document.getElementById('selectAll');
      if (selectAll) {
        const ids = items.map(getItemNumber).map(String);
        selectAll.checked = ids.length > 0 && ids.every(id => APP.selected.has(id));
        selectAll.addEventListener('change', (e) => {
          ids.forEach(id => {
            if (e.target.checked) APP.selected.add(id);
            else APP.selected.delete(id);
          });
          renderTable(items);
        });
      }

      if (!items.length) {
        els.tableBody.innerHTML = `<div class="empty">No items match the current filters.</div>`;
        APP.visibleCarouselIds = [];
        renderCarousel();
        return;
      }

      items.forEach(item => {
        const itemId = String(getItemNumber(item));
        const checked = APP.selected.has(itemId) ? 'checked' : '';
        const row = document.createElement('div');
        row.className = `table-row ${colClass}`;
        row.dataset.rowItem = itemId;
        row.innerHTML = cfg.columns.map(col => {
          if (col.key === '__select') {
            return `<div><input class="checkbox" type="checkbox" data-item-check="${escapeHtml(itemId)}" ${checked} /></div>`;
          }
          const raw = item[col.key];
          const val = col.money ? money(raw) : escapeHtml(raw ?? '-');
          const extra = col.money || col.key === 'Item #' ? 'mono' : '';
          return `<div class="${extra}">${val}</div>`;
        }).join('');

        row.querySelector(`[data-item-check="${CSS.escape(itemId)}"]`).addEventListener('change', (e) => {
          if (e.target.checked) APP.selected.add(itemId);
          else APP.selected.delete(itemId);
        });

        row.addEventListener('dblclick', () => openItemModal(item));
        els.tableBody.appendChild(row);
      });

      bindTableScrollCarousel();
      requestAnimationFrame(updateVisibleCarouselFromTable);
    }

    function renderCarousel() {
      if (!APP.carouselExpanded) {
        els.carousel.innerHTML = '';
        return;
      }

      const maxImages = APP.viewMode === 'iphone' ? 1 : 5;
      let items = [];

      if (APP.visibleCarouselIds.length) {
        items = APP.visibleCarouselIds
          .map(id => DATA.find(x => String(getItemNumber(x)) === String(id)))
          .filter(Boolean);
      }

      if (!items.length) {
        items = filteredItems().slice(0, maxImages);
      }

      items = items.slice(0, maxImages);

      if (!items.length) {
        els.carousel.innerHTML = `<div class="empty">No visible images for this view.</div>`;
        return;
      }

      els.carousel.innerHTML = items.map(item => `
        <div class="carousel-card">
          <button type="button" data-open-item="${escapeHtml(getItemNumber(item))}">
            <div class="carousel-image">
              <img src="${escapeHtml(getImagePath(item))}" alt="${escapeHtml(item.Player || 'Card image')}" onerror="this.onerror=null;this.src='card_images/0.jpg';" />
            </div>
            <div class="carousel-meta">
              ${escapeHtml(item.Player ?? '-')} - ${escapeHtml(item.Set ?? '-')} - ${escapeHtml(item.Variant ?? '-')} - ${escapeHtml(item['Card Number'] ?? '-')} - ${money(item['Desired Price'])}
            </div>
          </button>
        </div>
      `).join('');

      els.carousel.querySelectorAll('[data-open-item]').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = DATA.find(x => String(getItemNumber(x)) === btn.dataset.openItem);
          if (item) openItemModal(item);
        });
      });
    }

    function openModal(backdrop) {
      backdrop.classList.add('open');
      backdrop.setAttribute('aria-hidden', 'false');
    }

    function closeModal(backdrop) {
      backdrop.classList.remove('open');
      backdrop.setAttribute('aria-hidden', 'true');
    }

    function openItemModal(item) {
      const itemId = String(getItemNumber(item));
      const inCart = APP.cart.includes(itemId);

      els.itemModalContent.innerHTML = `
        <div class="detail-card">
          <div class="detail-image-wrap">
            <img src="${escapeHtml(getImagePath(item))}" alt="${escapeHtml(item.Player || 'Card image')}" onerror="this.onerror=null;this.src='card_images/0.jpg';" />
          </div>
          <button class="action-btn" id="addToCartFromModal">${inCart ? 'Already in cart' : 'Add to cart'}</button>
          <div class="disclaimer">Images were pulled from the web and may not be accurate. See card details for accurate information.</div>
        </div>
        <div class="detail-meta">
          <div><span class="detail-label">Item #</span><strong>${escapeHtml(getItemNumber(item))}</strong></div>
          <div><span class="detail-label">Player</span><strong>${escapeHtml(item.Player ?? '-')}</strong></div>
          <div><span class="detail-label">Set</span><strong>${escapeHtml(item.Set ?? '-')}</strong></div>
          <div><span class="detail-label">Variant</span><strong>${escapeHtml(item.Variant ?? '-')}</strong></div>
          <div><span class="detail-label">Card #</span><strong>${escapeHtml(item['Card Number'] ?? '-')}</strong></div>
          <div><span class="detail-label">Price</span><strong>${money(item['Desired Price'])}</strong></div>
        </div>
      `;

      document.getElementById('addToCartFromModal').addEventListener('click', () => {
        let addedCount = 0;
        if (!APP.cart.includes(itemId)) {
          APP.cart.push(itemId);
          addedCount = 1;
        }
        updateCartCount();
        renderCart();
        renderApp();
        closeModal(els.itemModalBackdrop);

        els.confirmAddText.textContent = `${addedCount} item${addedCount === 1 ? '' : 's'} added to the cart.`;
        openModal(els.confirmAddModalBackdrop);
      });

      openModal(els.itemModalBackdrop);
    }

    function updateCartCount() {
      els.cartCount.textContent = APP.cart.length;
    }

    function renderCart() {
      const cartItems = APP.cart.map(id => DATA.find(item => String(getItemNumber(item)) === String(id))).filter(Boolean);

      if (!cartItems.length) {
        els.cartContent.innerHTML = `<div class="empty">Cart is empty.</div>`;
        return;
      }

      const desiredTotal = cartItems.reduce((sum, item) => sum + (Number(item['Desired Price']) || 0), 0);
      const adjustedTotalBeforeGlobal = cartItems.reduce((sum, item) => {
        const id = String(getItemNumber(item));
        const override = APP.cartItemOverrides[id];
        const overrideNum = parseMoneyInput(override);
        return sum + (overrideNum != null ? overrideNum : (Number(item['Desired Price']) || 0));
      }, 0);

      const cartGlobalNum = parseMoneyInput(APP.cartGlobalOverride);
      const finalTotal = cartGlobalNum != null ? cartGlobalNum : adjustedTotalBeforeGlobal;
      const discount = desiredTotal - finalTotal;

      const trashSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>`;

      els.cartContent.innerHTML = `
        <div class="cart-list">
          ${cartItems.map(item => {
            const id = String(getItemNumber(item));
            return `
              <div class="cart-row">
                <div>
                  <strong>${escapeHtml(item.Player ?? '-')}</strong><br />
                  <span class="cart-desc">${escapeHtml(item.Set ?? '-')} - ${escapeHtml(item.Variant ?? '-')} - ${escapeHtml(item['Card Number'] ?? '-')}</span>
                </div>
                <div class="mono"><strong>Price:</strong> ${money(item['Desired Price'])}</div>
                <div>
                  <input
                    type="text"
                    inputmode="decimal"
                    autocomplete="off"
                    data-item-override="${escapeHtml(id)}"
                    value="${escapeHtml(APP.cartItemOverrides[id] ?? '')}"
                    placeholder="Override"
                  />
                </div>
                <div><button class="danger-btn remove-btn" data-remove-cart="${escapeHtml(id)}">${trashSvg}<span>Remove</span></button></div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="cart-summary">
          <div class="cart-adjust">
            <div><strong>Whole cart override</strong></div>
            <input
              type="text"
              inputmode="decimal"
              autocomplete="off"
              id="cartGlobalOverride"
              value="${escapeHtml(APP.cartGlobalOverride ?? '')}"
              placeholder="Optional total override"
            />
          </div>

          <div class="totals">
            ${discount > 0 ? `<div><strong>Discount Applied:</strong> <span class="mono">${money(discount)}</span></div>` : ''}
            <div><strong>Total Amount Due:</strong> <span class="mono">${money(finalTotal)}</span></div>
          </div>

          <div class="qr-grid">
            <div class="qr-card"><img src="card_images/QR_Code.png" alt="QR code 1" onerror="this.onerror=null;this.src='card_images/0.jpg';" /></div>
            <div class="qr-card"><img src="card_images/QR_Code2.png" alt="QR code 2" onerror="this.onerror=null;this.src='card_images/0.jpg';" /></div>
            <div class="qr-card"><img src="card_images/QR_Code3.png" alt="QR code 3" onerror="this.onerror=null;this.src='card_images/0.jpg';" /></div>
          </div>

          <div style="display:flex; gap:.75rem; flex-wrap:wrap;">
            <button class="action-btn" id="completeCheckoutBtn">Mark as Sold & Complete Checkout</button>
            <button class="secondary-btn" id="exportJsonBtn">Export Updated JSON</button>
          </div>
        </div>
      `;

      els.cartContent.querySelectorAll('[data-remove-cart]').forEach(btn => {
        btn.addEventListener('click', () => {
          APP.cart = APP.cart.filter(id => id !== btn.dataset.removeCart);
          delete APP.cartItemOverrides[btn.dataset.removeCart];
          updateCartCount();
          renderCart();
          renderApp();
        });
      });

      els.cartContent.querySelectorAll('[data-item-override]').forEach(input => {
        input.addEventListener('input', () => {
          const cleaned = cleanMoneyInput(input.value);
          APP.cartItemOverrides[input.dataset.itemOverride] = cleaned;
          input.value = cleaned;
          rerenderPreserveFocus(() => renderCart());
        });
      });

      document.getElementById('cartGlobalOverride').addEventListener('input', (e) => {
        const cleaned = cleanMoneyInput(e.target.value);
        APP.cartGlobalOverride = cleaned;
        e.target.value = cleaned;
        rerenderPreserveFocus(() => renderCart());
      });

      document.getElementById('completeCheckoutBtn').addEventListener('click', () => {
        cartItems.forEach(item => {
          const id = String(getItemNumber(item));
          const override = APP.cartItemOverrides[id];
          const overrideNum = parseMoneyInput(override);
          item.Status = 'Sold';
          item['Sale Price'] = overrideNum != null
            ? overrideNum
            : (Number(item['Desired Price']) || 0);
        });

        APP.cart = [];
        APP.cartItemOverrides = {};
        APP.cartGlobalOverride = '';
        updateCartCount();
        closeModal(els.cartModalBackdrop);
        renderApp();
        alert('Checkout complete. Selected items were marked as Sold.');
      });

      document.getElementById('exportJsonBtn').addEventListener('click', exportJson);
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'card-inventory-updated.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function requestProtectedView(view) {
      APP.pendingView = view;
      els.pinPromptText.textContent = 'Enter the Admin PIN to continue.';
      els.pinInput.value = '';
      els.pinError.textContent = '';
      openModal(els.pinModalBackdrop);
      setTimeout(() => els.pinInput.focus(), 30);
    }

    function switchView(view) {
      if (view === 'for-sale') {
        APP.currentView = view;
        APP.filters = {};
        APP.selected.clear();
        APP.sort = { key: FIELD_CONFIG[view].sortDefault, direction: 'desc', custom: false };
        APP.carouselExpanded = APP.viewMode === 'iphone' ? false : true;
        renderApp();
        return;
      }

      if (!APP.unlocked[view]) {
        requestProtectedView(view);
        return;
      }

      APP.currentView = view;
      APP.filters = {};
      APP.selected.clear();
      APP.sort = { key: FIELD_CONFIG[view].sortDefault, direction: 'desc', custom: false };
      APP.carouselExpanded = APP.viewMode === 'iphone' ? false : true;
      renderApp();
    }

    function handleTableAction() {
      const visibleItems = filteredItems();
      const chosen = visibleItems.filter(item => APP.selected.has(String(getItemNumber(item))));

      if (!chosen.length) return;

      if (APP.currentView === 'sold') {
        const ok = confirm(`Move ${chosen.length} selected item(s) back to For Sale?`);
        if (!ok) return;

        chosen.forEach(item => {
          item.Status = 'For Sale';
        });

        APP.selected.clear();
        renderApp();
        return;
      }

      let addedCount = 0;
      chosen.forEach(item => {
        const id = String(getItemNumber(item));
        if (!APP.cart.includes(id)) {
          APP.cart.push(id);
          addedCount++;
        }
      });

      updateCartCount();
      renderCart();
      APP.selected.clear();
      renderApp();

      els.confirmAddText.textContent = `${addedCount} item${addedCount === 1 ? '' : 's'} added to the cart.`;
      openModal(els.confirmAddModalBackdrop);
    }

    function applyTheme() {
      const button = document.querySelector('[data-theme-toggle]');
      const root = document.documentElement;

      const setTheme = (theme) => {
        root.setAttribute('data-theme', theme);
        els.themeIcon.innerHTML = themeIconSvg(theme);
        els.themeLabel.textContent = theme === 'dark' ? 'Light' : 'Dark';
        els.hamburgerThemeLabel.textContent = theme === 'dark' ? 'Light' : 'Dark';
        button.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      };

      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      setTheme(APP.manualTheme || (prefersDark ? 'dark' : 'light'));

      const toggleThemeFn = () => {
        const current = root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        APP.manualTheme = current === 'dark' ? 'light' : 'dark';
        setTheme(APP.manualTheme);
      };

      button.addEventListener('click', toggleThemeFn);
      els.hamburgerThemeBtn.addEventListener('click', toggleThemeFn);
    }

    function applyViewMode() {
      document.documentElement.setAttribute('data-view-mode', APP.viewMode);
      const nextLabel = APP.viewMode === 'iphone' ? 'Desktop' : 'Phone';
      els.viewModeLabel.textContent = nextLabel;
      els.hamburgerViewModeLabel.textContent = nextLabel;
    }

    function toggleViewMode() {
      APP.viewMode = APP.viewMode === 'iphone' ? 'desktop' : 'iphone';
      applyViewMode();

      if (APP.viewMode === 'iphone') {
        APP.filtersExpanded = false;
        APP.carouselExpanded = false;
      } else {
        APP.filtersExpanded = true;
        APP.carouselExpanded = true;
      }
      applyFiltersExpanded();
      renderApp();
      closeHamburgerMenu();
    }

    els.viewModeToggle.addEventListener('click', toggleViewMode);
    els.hamburgerViewModeBtn.addEventListener('click', toggleViewMode);

    function applyFiltersExpanded() {
      els.filtersSection.classList.toggle('collapsed', !APP.filtersExpanded);
      els.toggleFiltersBtn.textContent = APP.filtersExpanded ? 'Collapse Filters' : 'Expand Filters';
      els.toggleFiltersBtn.setAttribute('aria-expanded', String(APP.filtersExpanded));
    }

    els.toggleFiltersBtn.addEventListener('click', () => {
      APP.filtersExpanded = !APP.filtersExpanded;
      applyFiltersExpanded();
    });

    function openHamburgerMenu() {
      els.hamburgerMenu.classList.add('open');
      els.hamburgerBtn.setAttribute('aria-expanded', 'true');
    }
    function closeHamburgerMenu() {
      els.hamburgerMenu.classList.remove('open');
      els.hamburgerBtn.setAttribute('aria-expanded', 'false');
    }
    els.hamburgerBtn.addEventListener('click', () => {
      const isOpen = els.hamburgerMenu.classList.contains('open');
      if (isOpen) closeHamburgerMenu();
      else openHamburgerMenu();
    });

    document.addEventListener('click', (e) => {
      if (APP.viewMode !== 'iphone') return;
      if (!els.hamburgerMenu.classList.contains('open')) return;
      if (els.hamburgerMenu.contains(e.target) || els.hamburgerBtn.contains(e.target)) return;
      closeHamburgerMenu();
    });

    function getSortedMarqueeItems() {
      return DATA
        .filter(item => normalizeStatus(item.Status) === 'for sale')
        .filter(item => getImageId(item) !== undefined && getImageId(item) !== '')
        .slice()
        .sort((a, b) => {
          const pa = Number(a['Desired Price']) || 0;
          const pb = Number(b['Desired Price']) || 0;
          return pb - pa;
        });
    }

    function buildMarqueeTrack() {
      const items = getSortedMarqueeItems();
      els.marqueeTrack.innerHTML = '';

      if (!items.length) {
        els.marqueeTrack.innerHTML = '<div class="marquee-cap">No For Sale images found.</div>';
        return;
      }

      const sequence = [...items, ...items];

      sequence.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className = 'marquee-item';

        const img = document.createElement('img');
        img.src = getImagePath(item);
        img.alt = `${item.Player ?? 'Card'} — Desired Price ${item['Desired Price'] ?? ''}`;
        img.loading = 'lazy';
        img.onerror = function () { this.onerror = null; this.src = 'card_images/0.jpg'; };

        const cap = document.createElement('div');
        cap.className = 'marquee-cap';
        cap.textContent = `${item.Player ?? '-'} · ${money(item['Desired Price'])}`;

        wrap.appendChild(img);
        wrap.appendChild(cap);
        els.marqueeTrack.appendChild(wrap);
      });

      const duration = Math.max(20, items.length * 4);
      els.marqueeTrack.style.animationDuration = `${duration}s`;
    }

    function openMarquee() {
      buildMarqueeTrack();
      els.marqueeOverlay.classList.add('open');
      els.marqueeOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      closeHamburgerMenu();
    }

    function closeMarquee() {
      els.marqueeOverlay.classList.remove('open');
      els.marqueeOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    els.openMarqueeBtn.addEventListener('click', openMarquee);
    els.hamburgerMarqueeBtn.addEventListener('click', openMarquee);

    els.marqueeOverlay.addEventListener('click', closeMarquee);
    els.closeMarqueeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeMarquee(); });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && els.marqueeOverlay.classList.contains('open')) closeMarquee();
    });

    function renderApp() {
      ensureDefaultSort();
      const cfg = FIELD_CONFIG[APP.currentView];
      const items = filteredItems();

      els.filterHint.textContent = `Showing items marked ${cfg.statusLabel}`;
      els.statusChip.textContent = cfg.statusLabel;
      els.phoneStatusChip.textContent = cfg.statusLabel;
      els.itemCount.textContent = `${items.length} item${items.length === 1 ? '' : 's'} shown`;
      els.tableActionBtn.textContent = cfg.actionLabel;

      renderFilters();
      updateCarouselState();
      APP.visibleCarouselIds = [];
      renderTable(items);
      renderCarousel();
      renderCart();

      document.querySelectorAll('[data-view-link]').forEach(btn => {
        const active = btn.dataset.viewLink === APP.currentView;
        btn.style.background = active ? 'var(--color-primary)' : '';
        btn.style.color = active ? '#fff' : '';
        btn.style.borderColor = active ? 'transparent' : '';
      });
    }

    document.querySelectorAll('[data-close]').forEach(btn => {
      btn.addEventListener('click', () => {
        closeModal(document.getElementById(btn.dataset.close));
      });
    });

    document.querySelectorAll('.modal-backdrop').forEach(backdrop => {
      backdrop.addEventListener('click', (e) => {
        if (e.target === backdrop) closeModal(backdrop);
      });
    });

    document.querySelectorAll('[data-view-link]').forEach(btn => {
      btn.addEventListener('click', () => { switchView(btn.dataset.viewLink); closeHamburgerMenu(); });
    });

    els.tableActionBtn.addEventListener('click', handleTableAction);
    els.clearFiltersBtn.addEventListener('click', clearFilters);

    els.toggleCarouselBtn.addEventListener('click', () => {
      APP.carouselExpanded = !APP.carouselExpanded;
      renderApp();
    });

    els.openCartBtn.addEventListener('click', () => {
      renderCart();
      openModal(els.cartModalBackdrop);
    });

    els.pinSubmitBtn.addEventListener('click', () => {
      if (els.pinInput.value === APP.adminPin) {
        APP.unlocked[APP.pendingView] = true;
        closeModal(els.pinModalBackdrop);
        switchView(APP.pendingView);
      } else {
        els.pinError.textContent = 'Incorrect PIN.';
      }
    });

    els.pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') els.pinSubmitBtn.click();
    });

async function loadData() {
  try {
    const response = await fetch('card_data.json', { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    DATA = await response.json();
  } catch (err) {
    console.error('Failed to load card_data.json', err);
    DATA = [];
  }

  applyTheme();
  applyViewMode();
  applyFiltersExpanded();
  renderApp();
}

loadData();
  </script>
</body>
</html>
